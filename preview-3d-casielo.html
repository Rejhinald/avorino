<body>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.149.0/build/three.module.js",

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const EMBED_MODE =
      new URLSearchParams(window.location.search).get('embed') === '1' ||
      window.location.hash.indexOf('embed=1') !== -1;
    const PLAN_SLUG = 'casielo';
    if (EMBED_MODE) {
      const titleEl = document.getElementById('title');
      const infoEl = document.getElementById('info');
      if (titleEl) titleEl.style.display = 'none';
      if (infoEl) infoEl.style.display = 'none';
    }

    // ============================================
    // Constants (exact copy from ADU Visualizer)
    // ============================================
    const DIMENSIONS = {
      WALL_THICKNESS: 0.5,
      WALL_HEIGHT: 9,
      DOOR_WIDTH: 3,
      DOOR_HEIGHT: 6.67,
      WINDOW_WIDTH: 3,
      WINDOW_HEIGHT: 4,
      WINDOW_SILL_HEIGHT: 3,
    };

    const COLORS = {
      WALL: "#D5D0CA",
      WALL_INTERIOR: "#E0DBD5",
      WALL_PARTITION: "#E8DFD4",
      FLOOR_DEFAULT: "#E8E4E1",
      DOOR_FRAME: "#8B7355",
      DOOR_PANEL: "#A68B5B",
      WINDOW_FRAME: "#6B7280",
      WINDOW_GLASS: "#87CEEB",
      FURNITURE_DEFAULT: "#D4A574",
      GROUND: "#C8C8C8",
      ROOM_TYPES: {
        bedroom: "#E8DFD5",
        bathroom: "#D9E7ED",
        kitchen: "#F0E6D3",
        living: "#EBE5DB",
        dining: "#E8E0D0",
        closet: "#D8D8D8",
        laundry: "#E0E6EC",
        entry: "#E5E0D8",
        corridor: "#E8E8E8",
        office: "#E5E2DD",
        other: "#E0E0E0",
      },
    };

    const MATERIALS = {
      WALL: { roughness: 0.9, metalness: 0 },
      FLOOR: { roughness: 0.8, metalness: 0 },
      DOOR: { roughness: 0.6, metalness: 0 },
      WINDOW_FRAME: { roughness: 0.4, metalness: 0.2 },
      WINDOW_GLASS: { roughness: 0.1, metalness: 0.1, opacity: 0.4, transparent: true },
      FURNITURE: { roughness: 0.7, metalness: 0 },

    const FURNITURE_HEIGHTS = {
      bed_queen: { height: 2.5, color: "#8B7355" },
      bed_king: { height: 2.5, color: "#8B7355" },
      bed_twin: { height: 2.5, color: "#8B7355" },
      dresser: { height: 3.5, color: "#A68B5B" },
      nightstand: { height: 2, color: "#A68B5B" },
      toilet: { height: 2.5, color: "#FFFFFF" },
      sink: { height: 3, color: "#FFFFFF" },
      bathtub: { height: 2, color: "#FFFFFF" },
      shower: { height: 7, color: "#E0E0E0" },
      refrigerator: { height: 6, color: "#C0C0C0" },
      stove: { height: 3, color: "#404040" },
      dishwasher: { height: 3, color: "#C0C0C0" },
      kitchen_sink: { height: 3, color: "#C0C0C0" },
      sofa_3seat: { height: 2.5, color: "#6B8E9F" },
      sofa_2seat: { height: 2.5, color: "#6B8E9F" },
      armchair: { height: 2.5, color: "#6B8E9F" },
      coffee_table: { height: 1.5, color: "#8B7355" },
      dining_table: { height: 2.5, color: "#8B7355" },
      dining_chair: { height: 3, color: "#A68B5B" },
      desk: { height: 2.5, color: "#A68B5B" },
      office_chair: { height: 3.5, color: "#404040" },
      bookshelf: { height: 6, color: "#8B7355" },
      tall_closet: { height: 8.8, color: "#C8B79B" },
    };

    // ============================================
    // Blueprint data (embedded from casielo-blueprint-raw.json)
    // ============================================
    const blueprint = {"corners":[{"id":"d3d7ced0-c6f8-4643-a615-97caa961b325","x":-7,"y":-11.5},{"id":"c34d7a93-a8f9-4913-a0d1-7a5111f42c9e","x":9,"y":-11.5},{"id":"21fe4e52-1677-4cb1-8813-28538afd2f24","x":9,"y":10.5},{"id":"1c49d64f-9666-460e-96ca-1c43db3f1992","x":-7,"y":10.5},{"id":"71d4bd47-3e48-4f69-96dd-3c8c65521225","x":-7,"y":3.5},{"id":"10fd1828-5a63-4ec7-8519-8e91d9907e29","x":-1.5,"y":10.5},{"id":"f1696e49-0b40-4b70-b1d6-6f6454514544","x":-1.5,"y":3.5},{"id":"3d41212b-7b9c-4409-9ed2-2470d009669c","x":2,"y":-11.5},{"id":"1c777553-2376-4e99-af23-25afe021a0f7","x":2,"y":3.5}],"walls":[{"id":"0c445f1f-ec68-4ee4-a7e4-0d15b8126762","startCornerId":"c34d7a93-a8f9-4913-a0d1-7a5111f42c9e","endCornerId":"21fe4e52-1677-4cb1-8813-28538afd2f24","thickness":0.5,"height":9,"wallType":"solid"},{"id":"3b953635-f953-4e6e-a0ce-2fc2c7a31a44","startCornerId":"1c49d64f-9666-460e-96ca-1c43db3f1992","endCornerId":"71d4bd47-3e48-4f69-96dd-3c8c65521225","thickness":0.5,"height":9,"wallType":"solid"},{"id":"42ca8f70-1e7a-4e30-aab6-ff35d4965b09","startCornerId":"71d4bd47-3e48-4f69-96dd-3c8c65521225","endCornerId":"d3d7ced0-c6f8-4643-a615-97caa961b325","thickness":0.5,"height":9,"wallType":"solid"},{"id":"0b92928c-9380-4ca6-8a33-25336c4f01d0","startCornerId":"21fe4e52-1677-4cb1-8813-28538afd2f24","endCornerId":"10fd1828-5a63-4ec7-8519-8e91d9907e29","thickness":0.5,"height":9,"wallType":"solid"},{"id":"1d069eec-e9f4-4529-998b-e1bc6a42f227","startCornerId":"71d4bd47-3e48-4f69-96dd-3c8c65521225","endCornerId":"f1696e49-0b40-4b70-b1d6-6f6454514544","thickness":0.5,"height":9,"wallType":"solid"},{"id":"8c631417-5d9c-4656-99d1-ab806ff82265","startCornerId":"f1696e49-0b40-4b70-b1d6-6f6454514544","endCornerId":"10fd1828-5a63-4ec7-8519-8e91d9907e29","thickness":0.5,"height":9,"wallType":"solid"},{"id":"c4617834-87c6-4c63-bb3b-f3df3b92efb0","startCornerId":"3d41212b-7b9c-4409-9ed2-2470d009669c","endCornerId":"c34d7a93-a8f9-4913-a0d1-7a5111f42c9e","thickness":0.5,"height":9,"wallType":"solid"},{"id":"0bf86416-b515-48d4-8118-2ffd05bb3bb9","startCornerId":"f1696e49-0b40-4b70-b1d6-6f6454514544","endCornerId":"1c777553-2376-4e99-af23-25afe021a0f7","thickness":0.5,"height":9,"wallType":"solid"},{"id":"06ed5643-837d-4b64-91ec-91d332e27a13","startCornerId":"3d41212b-7b9c-4409-9ed2-2470d009669c","endCornerId":"1c777553-2376-4e99-af23-25afe021a0f7","thickness":0.5,"height":9,"wallType":"solid"},{"id":"75ed8648-140d-42c8-82e5-6721d4a10f35","startCornerId":"10fd1828-5a63-4ec7-8519-8e91d9907e29","endCornerId":"1c49d64f-9666-460e-96ca-1c43db3f1992","thickness":0.5,"height":9,"wallType":"solid"},{"id":"ba2869cb-8880-49c1-a63c-d883a306698e","startCornerId":"d3d7ced0-c6f8-4643-a615-97caa961b325","endCornerId":"3d41212b-7b9c-4409-9ed2-2470d009669c","thickness":0.5,"height":9,"wallType":"solid"}],"doors":[{"id":"e8f14c21-059c-4852-b0c7-7513694b4c1f","wallId":"1d069eec-e9f4-4529-998b-e1bc6a42f227","position":0.36540764252538854,"type":"single","width":3,"height":6.67},{"id":"8188d8e1-29c3-4b26-a2b4-ea19f6e81003","wallId":"0b92928c-9380-4ca6-8a33-25336c4f01d0","position":0.8081388236291099,"type":"single","width":3,"height":6.67},{"id":"1098643d-ea48-41c7-88b7-b84845358bc6","wallId":"06ed5643-837d-4b64-91ec-91d332e27a13","position":0.5983969209861865,"type":"opening","width":3,"height":6.67},{"id":"a120d1e5-ce47-4083-98f9-4bd3f593b636","wallId":"06ed5643-837d-4b64-91ec-91d332e27a13","position":0.4444491128620189,"type":"opening","width":3,"height":6.67},{"id":"bd290a41-689b-41ba-b02e-07ec79556811","wallId":"06ed5643-837d-4b64-91ec-91d332e27a13","position":0.26562085089960213,"type":"opening","width":3,"height":6.67}],"windows":[{"id":"c95870f6-18c3-49b1-a687-d84ab65b6b96","wallId":"75ed8648-140d-42c8-82e5-6721d4a10f35","position":0.48615783426184966,"type":"standard","width":3,"height":4,"sillHeight":3},{"id":"bfe8e053-02ff-4819-9bf7-23ba8b8f969c","wallId":"ba2869cb-8880-49c1-a63c-d883a306698e","position":0.4949997419278528,"type":"standard","width":3,"height":4,"sillHeight":3},{"id":"f0da547f-a4d6-48bf-a45e-06fa313551aa","wallId":"0c445f1f-ec68-4ee4-a7e4-0d15b8126762","position":0.146116987403327,"type":"standard","width":3,"height":4,"sillHeight":3},{"id":"2fda609a-1381-4827-8a10-7787177bdc98","wallId":"0c445f1f-ec68-4ee4-a7e4-0d15b8126762","position":0.5481489335011495,"type":"standard","width":3,"height":4,"sillHeight":3},{"id":"d171f1e1-a186-4607-99d6-adabac430b5b","wallId":"0b92928c-9380-4ca6-8a33-25336c4f01d0","position":0.377173826981445,"type":"standard","width":3,"height":4,"sillHeight":3},{"id":"37a20d2b-a71b-41c5-832a-2afc4b65623e","wallId":"c4617834-87c6-4c63-bb3b-f3df3b92efb0","position":0.5077013893996091,"type":"standard","width":3,"height":4,"sillHeight":3}],"furniture":[{"id":"bcc42119-144d-4728-b0ca-8bf4ead6daa4","type":"bed_queen","x":-3.5,"y":-6.5,"rotation":270,"width":5,"depth":6.67},{"id":"a62a576a-2acc-497f-95c3-0080047c6ac7","type":"dresser","x":-1,"y":2.5,"rotation":0,"width":5,"depth":1.5},{"id":"f2e5d8a5-fdb7-4b71-9fe2-3766682a91b8","type":"nightstand","x":-6,"y":-10,"rotation":450,"width":2,"depth":1.5},{"id":"e76caf42-e3b0-4fcf-bba5-86d0e498279e","type":"nightstand","x":-6,"y":-3,"rotation":90,"width":2,"depth":1.5},{"id":"deec7883-0e1c-4f81-927c-2bbce1cf5fab","type":"sofa_3seat","x":5.5,"y":-10,"rotation":0,"width":7,"depth":3},{"id":"0a093d64-d1d3-46b4-a021-7d1cdb3a7d3a","type":"toilet","x":-3,"y":6.5,"rotation":90,"width":1.5,"depth":2.33},{"id":"34c4d4df-caf7-4be4-b4fc-cf4da53c6952","type":"sink","x":-2.5,"y":4.5,"rotation":270,"width":2,"depth":1.5},{"id":"f88fa30d-9ac3-40d4-b76b-c52f01474527","type":"bathtub","x":-4,"y":9,"rotation":270,"width":2.5,"depth":5}],"rooms":[{"id":"r_casielo_bedroom","name":"Room 1","type":"bedroom","area":135,"corners":[{"x":-7,"y":-11.5},{"x":2,"y":-11.5},{"x":2,"y":3.5},{"x":-1.5,"y":3.5},{"x":-7,"y":3.5}]},{"id":"r_casielo_living","name":"Room 2","type":"living","area":178.5,"corners":[{"x":2,"y":-11.5},{"x":9,"y":-11.5},{"x":9,"y":10.5},{"x":-1.5,"y":10.5},{"x":-1.5,"y":3.5},{"x":2,"y":3.5}]},{"id":"r_casielo_bathroom","name":"Room 3","type":"bathroom","area":38.5,"corners":[{"x":-7,"y":3.5},{"x":-1.5,"y":3.5},{"x":-1.5,"y":10.5},{"x":-7,"y":10.5}]}]};

    // ============================================
    // Geometry Processing (exact port from useGeometry hook)
    // ============================================

    // Corner lookup map
    const cornerMap = new Map();
    blueprint.corners.forEach(c => cornerMap.set(c.id, { x: c.x, y: c.y }));

    // Process walls
    const walls3D = blueprint.walls
      .filter(wall => wall.wallType !== 'virtual')
      .map(wall => {
        const start = cornerMap.get(wall.startCornerId);
        const end = cornerMap.get(wall.endCornerId);
        if (!start || !end) return null;

        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const thickness = wall.thickness ?? DIMENSIONS.WALL_THICKNESS;
        const baseHeight = wall.height ?? DIMENSIONS.WALL_HEIGHT;
        const height = wall.wallType === 'partition' ? baseHeight / 2 : baseHeight;
        const wallType = wall.wallType ?? 'solid';

        // Find openings on this wall (only for solid walls)
        const openings = [];
        if (wallType === 'solid') {
          // Doors
          blueprint.doors
            .filter(d => d.wallId === wall.id)
            .forEach(door => {
              const pos = door.position;
              const centerX = start.x + dx * pos;
              const centerZ = start.y + dy * pos;
              openings.push({
                type: 'door',
                id: door.id,
                center: { x: centerX, y: (door.height ?? DIMENSIONS.DOOR_HEIGHT) / 2, z: centerZ },
                width: door.width ?? DIMENSIONS.DOOR_WIDTH,
                height: door.height ?? DIMENSIONS.DOOR_HEIGHT,
                bottomY: 0,
                doorType: door.type,
              });
            });

          // Windows
          blueprint.windows
            .filter(w => w.wallId === wall.id)
            .forEach(window => {
              const pos = window.position;
              const centerX = start.x + dx * pos;
              const centerZ = start.y + dy * pos;
              const sillHeight = window.sillHeight ?? DIMENSIONS.WINDOW_SILL_HEIGHT;
              const windowHeight = window.height ?? DIMENSIONS.WINDOW_HEIGHT;
              openings.push({
                type: 'window',
                id: window.id,
                center: { x: centerX, y: sillHeight + windowHeight / 2, z: centerZ },
                width: window.width ?? DIMENSIONS.WINDOW_WIDTH,
                height: windowHeight,
                bottomY: sillHeight,
                windowType: window.type,
              });
            });
        }

        return {
          id: wall.id,
          start: { x: start.x, y: 0, z: start.y },
          end: { x: end.x, y: 0, z: end.y },
          thickness,
          height,
          angle,
          length,
          wallType,
          openings: openings.sort((a, b) => {
            const posA = Math.sqrt((a.center.x - start.x) ** 2 + (a.center.z - start.y) ** 2);
            const posB = Math.sqrt((b.center.x - start.x) ** 2 + (b.center.z - start.y) ** 2);
            return posA - posB;
          }),
        };
      })
      .filter(w => w !== null);

    // Process floors (rooms) - filter entry/corridor and small rooms
    const floors3D = blueprint.rooms
      .filter(room => {
        if (room.type === 'entry' || room.type === 'corridor') return false;
        if (room.area && room.area < 10) return false;
        return true;
      })
      .map(room => ({
        id: room.id,
        name: room.name || room.type,
        type: room.type,
        vertices: room.corners.map(c => ({ x: c.x, y: 0, z: c.y })),
        color: COLORS.ROOM_TYPES[room.type] || COLORS.FLOOR_DEFAULT,
      }));

    function normalizeCasieloFurniture(item) {
      if (item.type === 'dresser') {
        return { ...item, type: 'tall_closet', height: 8.8, depth: 1.55, renderColor: '#C8B79B' };
      }
      return item;
    }

    // Process furniture
    const furniture3D = blueprint.furniture.map(normalizeCasieloFurniture).map(item => {
      const config = FURNITURE_HEIGHTS[item.type] || { height: 2, color: COLORS.FURNITURE_DEFAULT };
      return {
        id: item.id,
        type: item.type,
        position: { x: item.x, y: config.height / 2, z: item.y },
        rotation: ((item.rotation || 0) * Math.PI) / 180,
        width: item.width || 2,
        depth: item.depth || 2,
        height: config.height,
        color: item.renderColor || config.color,
      };
    });

    // Calculate scene bounds
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    blueprint.corners.forEach(c => {
      if (c.x < minX) minX = c.x;
      if (c.x > maxX) maxX = c.x;
      if (c.y < minZ) minZ = c.y;
      if (c.y > maxZ) maxZ = c.y;
    });
    const padding = 5;
    minX -= padding; maxX += padding; minZ -= padding; maxZ += padding;
    const bounds = {
      minX, maxX, minZ, maxZ,
      width: maxX - minX,
      depth: maxZ - minZ,
      centerX: (minX + maxX) / 2,
      centerZ: (minZ + maxZ) / 2,
    };

    // ============================================
    // Three.js Setup
    // ============================================
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#f2ede5');

    // Camera - perspective from above
    const camHeight = Math.max(bounds.width, bounds.depth) + 20;
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(bounds.centerX, camHeight * 1.4, bounds.centerZ + 0.1);

    // OrbitControls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(bounds.centerX, 0, bounds.centerZ);
    controls.enablePan = true;
    controls.enableZoom = true;
    controls.enableRotate = true;
    controls.minDistance = 10;
    controls.maxDistance = 200;
    controls.maxPolarAngle = Math.PI / 2.1;
    controls.minPolarAngle = 0;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 0;
    controls.update();

    // ============================================
    // Lighting (exact copy from ADU Visualizer)
    // ============================================

    // Tone mapping — darker exposure
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.62;
    renderer.outputEncoding = THREE.sRGBEncoding;

    // Hemisphere light — subtle sky/ground
    const hemiLight = new THREE.HemisphereLight(0xe7dcc5, 0x6f5d44, 0.36);
    scene.add(hemiLight);

    // Main directional (sun) — warm, moderate
    const dirLight = new THREE.DirectionalLight(0xfff1d2, 0.74);
    dirLight.position.set(bounds.centerX + 25, 40, bounds.centerZ + 25);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.far = 150;
    dirLight.shadow.camera.left = -60;
    dirLight.shadow.camera.right = 60;
    dirLight.shadow.camera.top = 60;
    dirLight.shadow.camera.bottom = -60;
    dirLight.shadow.bias = -0.001;
    scene.add(dirLight);

    // Fill light — very subtle
    const fillLight = new THREE.DirectionalLight(0xd4c1a5, 0.12);
    fillLight.position.set(bounds.centerX - 18, 22, bounds.centerZ - 10);
    scene.add(fillLight);

    // Ambient — minimal
    const ambientLight = new THREE.AmbientLight(0xfff7eb, 0.16);
    scene.add(ambientLight);

    // ============================================
    // Build Scene Geometry
    // ============================================

    // --- Procedural Textures ---
    function makeWoodTexture(baseColor, grainColor, scale) {
      const size = 512;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      // Base
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, size, size);
      // Wood grain lines
      ctx.strokeStyle = grainColor;
      ctx.globalAlpha = 0.3;
      for (let i = 0; i < size; i += (scale || 8)) {
        ctx.lineWidth = 0.5 + Math.random() * 1.5;
        ctx.beginPath();
        ctx.moveTo(0, i + Math.random() * 4);
        for (let x = 0; x < size; x += 20) {
          ctx.lineTo(x, i + Math.sin(x * 0.02) * 3 + Math.random() * 2);
        }
        ctx.stroke();
      }
      // Knots
      ctx.globalAlpha = 0.15;
      for (let k = 0; k < 3; k++) {
        const kx = Math.random() * size, ky = Math.random() * size;
        ctx.beginPath();
        ctx.arc(kx, ky, 8 + Math.random() * 12, 0, Math.PI * 2);
        ctx.fillStyle = grainColor;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(2, 2);
      return tex;
    }

    function makeTileTexture(baseColor, groutColor, tileSize) {
      const size = 512;
      const ts = tileSize || 64;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, size, size);
      // Grout lines
      ctx.strokeStyle = groutColor;
      ctx.lineWidth = 2;
      for (let x = 0; x <= size; x += ts) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, size); ctx.stroke();
      }
      for (let y = 0; y <= size; y += ts) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(size, y); ctx.stroke();
      }
      // Slight tile variation
      ctx.globalAlpha = 0.05;
      for (let x = 0; x < size; x += ts) {
        for (let y = 0; y < size; y += ts) {
          ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
          ctx.fillRect(x + 2, y + 2, ts - 4, ts - 4);
        }
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(2, 2);
      return tex;
    }

    function makeWallTexture() {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = COLORS.WALL;
      ctx.fillRect(0, 0, size, size);
      // Subtle noise
      ctx.globalAlpha = 0.03;
      for (let i = 0; i < 2000; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
        const x = Math.random() * size, y = Math.random() * size;
        ctx.fillRect(x, y, 2, 2);
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(3, 3);
      return tex;
    }

    // Create texture maps per room type
    const woodFloorTex = makeWoodTexture('#C8B494', '#A08060', 6);
    const woodFloorTex2 = makeWoodTexture('#D4C0A0', '#B09878', 7);
    const tileFloorTex = makeTileTexture('#D0DAE0', '#B8C4CC', 48);
    const kitchenFloorTex = makeWoodTexture('#D0C4A8', '#B0A488', 8);
    const closetFloorTex = makeWoodTexture('#C0B8A8', '#A09888', 10);
    const wallTex = makeWallTexture();

    const floorMaterials = {
      bedroom: new THREE.MeshStandardMaterial({ map: woodFloorTex, roughness: 0.75, metalness: 0 }),
      bathroom: new THREE.MeshStandardMaterial({ map: tileFloorTex, roughness: 0.4, metalness: 0.05 }),
      kitchen: new THREE.MeshStandardMaterial({ map: kitchenFloorTex, roughness: 0.7, metalness: 0 }),
      living: new THREE.MeshStandardMaterial({ map: woodFloorTex2, roughness: 0.7, metalness: 0 }),
      closet: new THREE.MeshStandardMaterial({ map: closetFloorTex, roughness: 0.8, metalness: 0 }),
      laundry: new THREE.MeshStandardMaterial({ color: '#D8DDE2', roughness: 0.6, metalness: 0.05 }),
      other: new THREE.MeshStandardMaterial({ map: closetFloorTex, roughness: 0.8, metalness: 0 }),
    };

    // --- Walls ---
    function createWallMaterial(wallType) {
      const wallColor = wallType === 'partition' ? COLORS.WALL_PARTITION : COLORS.WALL;
      return new THREE.MeshStandardMaterial({
        map: wallTex,
        color: wallColor,
        roughness: MATERIALS.WALL.roughness,
        metalness: MATERIALS.WALL.metalness,
      });
    }

    // --- Floors (after textures are defined) ---
    floors3D.forEach(floor => {
      if (floor.vertices.length < 3) return;
      const shape = new THREE.Shape();
      shape.moveTo(floor.vertices[0].x, -floor.vertices[0].z);
      for (let i = 1; i < floor.vertices.length; i++) {
        shape.lineTo(floor.vertices[i].x, -floor.vertices[i].z);
      }
      shape.closePath();
      const roomType = floor.type || 'other';
      const floorMat = floorMaterials[roomType] || floorMaterials.other;
      const mat = floorMat.clone();
      mat.side = THREE.DoubleSide;
      const floorMesh = new THREE.Mesh(new THREE.ShapeGeometry(shape), mat);
      floorMesh.rotation.set(-Math.PI / 2, 0, 0);
      floorMesh.position.set(0, 0.01, 0);
      floorMesh.receiveShadow = true;
      scene.add(floorMesh);
    });

    // --- Walls ---
    walls3D.forEach(wall => {
      const { start, end, thickness, height, angle, length, openings, wallType } = wall;
      const wallColor = wallType === 'partition' ? COLORS.WALL_PARTITION : COLORS.WALL;

      if (openings.length === 0) {
        // Simple wall - no openings
        const centerX = (start.x + end.x) / 2;
        const centerZ = (start.z + end.z) / 2;
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(length, height, thickness),
          new THREE.MeshStandardMaterial({
            color: wallColor,
            roughness: MATERIALS.WALL.roughness,
            metalness: MATERIALS.WALL.metalness,
          })
        );
        mesh.position.set(centerX, height / 2, centerZ);
        mesh.rotation.set(0, -angle, 0);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
      } else {
        // Wall with openings - render segments around them
        const wallGroup = new THREE.Group();
        wallGroup.position.set(start.x, 0, start.z);
        wallGroup.rotation.set(0, -angle, 0);

        const sortedOpenings = [...openings].sort((a, b) => {
          const posA = Math.sqrt((a.center.x - start.x) ** 2 + (a.center.z - start.z) ** 2);
          const posB = Math.sqrt((b.center.x - start.x) ** 2 + (b.center.z - start.z) ** 2);
          return posA - posB;
        });

        let lastEnd = 0;
        const wallMat = new THREE.MeshStandardMaterial({
          color: wallColor,
          roughness: MATERIALS.WALL.roughness,
          metalness: MATERIALS.WALL.metalness,
        });

        sortedOpenings.forEach(opening => {
          const distFromStart = Math.sqrt(
            (opening.center.x - start.x) ** 2 + (opening.center.z - start.z) ** 2
          );
          const openingStart = distFromStart - opening.width / 2;
          const openingEnd = distFromStart + opening.width / 2;

          // Wall segment before this opening
          if (openingStart > lastEnd + 0.1) {
            const segLength = openingStart - lastEnd;
            const segCenter = lastEnd + segLength / 2;
            const seg = new THREE.Mesh(
              new THREE.BoxGeometry(segLength, height, thickness),
              wallMat
            );
            seg.position.set(segCenter, height / 2, 0);
            seg.castShadow = true;
            seg.receiveShadow = true;
            wallGroup.add(seg);
          }

          // Wall above opening
          if (opening.bottomY + opening.height < height - 0.1) {
            const aboveHeight = height - (opening.bottomY + opening.height);
            const seg = new THREE.Mesh(
              new THREE.BoxGeometry(opening.width, aboveHeight, thickness),
              wallMat
            );
            seg.position.set(distFromStart, opening.bottomY + opening.height + aboveHeight / 2, 0);
            seg.castShadow = true;
            seg.receiveShadow = true;
            wallGroup.add(seg);
          }

          // Wall below opening (for windows)
          if (opening.bottomY > 0.1) {
            const seg = new THREE.Mesh(
              new THREE.BoxGeometry(opening.width, opening.bottomY, thickness),
              wallMat
            );
            seg.position.set(distFromStart, opening.bottomY / 2, 0);
            seg.castShadow = true;
            seg.receiveShadow = true;
            wallGroup.add(seg);
          }

          lastEnd = openingEnd;
        });

        // Wall segment after last opening
        if (lastEnd < length - 0.1) {
          const segLength = length - lastEnd;
          const segCenter = lastEnd + segLength / 2;
          const seg = new THREE.Mesh(
            new THREE.BoxGeometry(segLength, height, thickness),
            wallMat
          );
          seg.position.set(segCenter, height / 2, 0);
          seg.castShadow = true;
          seg.receiveShadow = true;
          wallGroup.add(seg);
        }

        scene.add(wallGroup);
      }
    });

    // --- Corner Posts ---
    const cornerPostMap = new Map();
    walls3D.forEach(wall => {
      const startKey = `${wall.start.x.toFixed(2)},${wall.start.z.toFixed(2)}`;
      if (!cornerPostMap.has(startKey)) {
        cornerPostMap.set(startKey, {
          x: wall.start.x, z: wall.start.z,
          height: wall.height, thickness: wall.thickness,
        });
      }
      const endKey = `${wall.end.x.toFixed(2)},${wall.end.z.toFixed(2)}`;
      if (!cornerPostMap.has(endKey)) {
        cornerPostMap.set(endKey, {
          x: wall.end.x, z: wall.end.z,
          height: wall.height, thickness: wall.thickness,
        });
      }
    });

    const cornerPostMat = new THREE.MeshStandardMaterial({
      color: COLORS.WALL,
      roughness: MATERIALS.WALL.roughness,
      metalness: MATERIALS.WALL.metalness,
    });

    cornerPostMap.forEach(corner => {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(corner.thickness, corner.height, corner.thickness),
        cornerPostMat
      );
      mesh.position.set(corner.x, corner.height / 2, corner.z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
    });

    // --- Doors — just open holes, no frames ---
    // Wall openings already cut the holes. Nothing to render.

    // --- Windows (frame + transparent glass) ---
    const winFrameMat = new THREE.MeshStandardMaterial({
      color: COLORS.WINDOW_FRAME, roughness: 0.4, metalness: 0.2,
    });
    const glassMat = new THREE.MeshStandardMaterial({
      color: COLORS.WINDOW_GLASS, roughness: 0.05, metalness: 0.1,
      transparent: true, opacity: 0.25, side: THREE.DoubleSide,
    });

    walls3D.forEach(wall => {
      wall.openings.forEach(opening => {
        if (opening.type !== 'window') return;

        const distFromStart = Math.sqrt(
          (opening.center.x - wall.start.x) ** 2 + (opening.center.z - wall.start.z) ** 2
        );
        const localX = distFromStart;
        const frameW = 0.12;
        const frameD = wall.thickness + 0.02;
        const cy = opening.bottomY + opening.height / 2;

        const winGroup = new THREE.Group();
        winGroup.position.set(wall.start.x, 0, wall.start.z);
        winGroup.rotation.set(0, -wall.angle, 0);

        // Frame — 4 bars (top, bottom, left, right)
        function addBar(geo, mat, x, y, z) {
          var m = new THREE.Mesh(geo, mat);
          m.position.set(x, y, z);
          winGroup.add(m);
        }
        // Top
        addBar(new THREE.BoxGeometry(opening.width + frameW * 2, frameW, frameD), winFrameMat,
          localX, cy + opening.height / 2, 0);
        // Bottom (sill — slightly wider and deeper)
        addBar(new THREE.BoxGeometry(opening.width + frameW * 2 + 0.3, frameW * 1.5, frameD + 0.15), winFrameMat,
          localX, opening.bottomY, 0);
        // Left
        addBar(new THREE.BoxGeometry(frameW, opening.height, frameD), winFrameMat,
          localX - opening.width / 2, cy, 0);
        // Right
        addBar(new THREE.BoxGeometry(frameW, opening.height, frameD), winFrameMat,
          localX + opening.width / 2, cy, 0);
        // Center mullion
        addBar(new THREE.BoxGeometry(frameW * 0.7, opening.height - frameW, frameD * 0.5), winFrameMat,
          localX, cy, 0);

        // Glass pane — very thin, transparent
        const glass = new THREE.Mesh(
          new THREE.BoxGeometry(opening.width - frameW, opening.height - frameW, 0.03), glassMat
        );
        glass.position.set(localX, cy, 0);
        winGroup.add(glass);

        scene.add(winGroup);
      });
    });

    // --- Procedural Furniture ---
    function makeFurniturePiece(type, w, h, d, color) {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0 });
      const darkMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.7), roughness: 0.8 });
      const whiteMat = new THREE.MeshStandardMaterial({ color: '#f8f6f2', roughness: 0.5 });
      const fabricMat = new THREE.MeshStandardMaterial({ color, roughness: 0.9, metalness: 0 });

      if (type === 'bed_queen' || type === 'bed_king' || type === 'bed_twin') {
        // Mattress
        var mw = w * 0.9, md = d * 0.85;
        var mattress = new THREE.Mesh(new THREE.BoxGeometry(mw, 0.8, md), whiteMat);
        mattress.position.set(0, 1.0, d * 0.05);
        group.add(mattress);
        // Headboard
        var hb = new THREE.Mesh(new THREE.BoxGeometry(w, 2.5, 0.3), darkMat);
        hb.position.set(0, 1.25, -d / 2 + 0.15);
        group.add(hb);
        // Frame
        var frame = new THREE.Mesh(new THREE.BoxGeometry(w, 0.6, d), mat);
        frame.position.set(0, 0.3, 0);
        group.add(frame);
        // Pillow(s)
        var pw = mw * 0.4;
        var pillow = new THREE.Mesh(new THREE.BoxGeometry(pw, 0.25, 1.2), new THREE.MeshStandardMaterial({ color: '#e8e4df', roughness: 0.95 }));
        pillow.position.set(-pw * 0.55, 1.5, -d * 0.3);
        group.add(pillow);
        var pillow2 = pillow.clone();
        pillow2.position.x = pw * 0.55;
        group.add(pillow2);
      } else if (type === 'sofa_3seat' || type === 'sofa_2seat') {
        // Seat cushion
        var seat = new THREE.Mesh(new THREE.BoxGeometry(w, 0.6, d * 0.65), fabricMat);
        seat.position.set(0, 0.9, d * 0.1);
        group.add(seat);
        // Back cushion
        var back = new THREE.Mesh(new THREE.BoxGeometry(w, 1.2, d * 0.3), fabricMat);
        back.position.set(0, 1.2, -d * 0.35);
        group.add(back);
        // Base/frame
        var base = new THREE.Mesh(new THREE.BoxGeometry(w, 0.6, d), darkMat);
        base.position.set(0, 0.3, 0);
        group.add(base);
        // Arms
        var armMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.85), roughness: 0.85 });
        var armL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, d), armMat);
        armL.position.set(-w / 2 + 0.15, 1.1, 0);
        group.add(armL);
        var armR = armL.clone();
        armR.position.x = w / 2 - 0.15;
        group.add(armR);
      } else if (type === 'coffee_table') {
        // Top
        var top = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d), mat);
        top.position.set(0, h - 0.08, 0);
        group.add(top);
        // Legs
        for (var lx = -1; lx <= 1; lx += 2) {
          for (var lz = -1; lz <= 1; lz += 2) {
            var leg = new THREE.Mesh(new THREE.BoxGeometry(0.15, h - 0.15, 0.15), darkMat);
            leg.position.set(lx * (w / 2 - 0.2), (h - 0.15) / 2, lz * (d / 2 - 0.2));
            group.add(leg);
          }
        }
      } else if (type === 'nightstand') {
        var ns = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        ns.position.set(0, h / 2, 0);
        group.add(ns);
        // Drawer face
        var drawer = new THREE.Mesh(new THREE.BoxGeometry(w * 0.8, h * 0.35, 0.05), darkMat);
        drawer.position.set(0, h * 0.5, d / 2 + 0.03);
        group.add(drawer);
      } else if (type === 'toilet') {
        // Bowl
        var bowl = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.5, 1.2, 12), whiteMat);
        bowl.position.set(0, 0.6, 0.3);
        group.add(bowl);
        // Tank
        var tank = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 0.6), whiteMat);
        tank.position.set(0, 0.75, -0.5);
        group.add(tank);
      } else if (type === 'bathtub') {
        // Outer shell
        var outer = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), whiteMat);
        outer.position.set(0, h / 2, 0);
        group.add(outer);
        // Inner (cutout look — slightly inset darker)
        var inner = new THREE.Mesh(new THREE.BoxGeometry(w - 0.3, 0.3, d - 0.3),
          new THREE.MeshStandardMaterial({ color: '#d0dde8', roughness: 0.3 }));
        inner.position.set(0, h - 0.15, 0);
        group.add(inner);
      } else if (type === 'sink' || type === 'kitchen_sink') {
        var cabinetMat = new THREE.MeshStandardMaterial({
          color: type === 'kitchen_sink' ? '#F1F1EC' : '#FBFAF7',
          roughness: 0.45,
          metalness: 0.03
        });
        var topMat = new THREE.MeshStandardMaterial({
          color: type === 'kitchen_sink' ? '#E8E5DE' : '#F5F3EF',
          roughness: 0.28,
          metalness: 0.04
        });
        var basinMat = new THREE.MeshStandardMaterial({
          color: '#8F9AA4',
          roughness: 0.24,
          metalness: 0.32
        });
        var hardwareMat = new THREE.MeshStandardMaterial({
          color: '#8E98A1',
          roughness: 0.22,
          metalness: 0.62
        });

        var bodyDepth = type === 'kitchen_sink' ? d : d * 0.92;
        var body = new THREE.Mesh(new THREE.BoxGeometry(w, h - 0.18, bodyDepth), cabinetMat);
        body.position.set(0, (h - 0.18) / 2, 0);
        group.add(body);

        var topSlab = new THREE.Mesh(new THREE.BoxGeometry(w + 0.06, 0.16, d + 0.06), topMat);
        topSlab.position.set(0, h - 0.08, 0);
        group.add(topSlab);

        if (type === 'sink') {
          var vanityDoorWidth = (w - 0.2) / 2;
          for (var vd = 0; vd < 2; vd++) {
            var vanityDoor = new THREE.Mesh(
              new THREE.BoxGeometry(vanityDoorWidth, h * 0.58, 0.05),
              new THREE.MeshStandardMaterial({ color: '#EEEAE3', roughness: 0.6 })
            );
            vanityDoor.position.set((vd === 0 ? -1 : 1) * vanityDoorWidth * 0.52, h * 0.32, bodyDepth / 2 + 0.03);
            group.add(vanityDoor);
          }
        }

        if (type === 'kitchen_sink') {
          var basinOffset = w > 2.2 ? w * 0.16 : 0;
          var basinWidth = w > 2.2 ? w * 0.28 : w * 0.5;
          var basinDepth = d * 0.34;
          function addKitchenBasin(offsetX) {
            var cavity = new THREE.Mesh(
              new THREE.BoxGeometry(basinWidth, 0.22, basinDepth),
              basinMat
            );
            cavity.position.set(offsetX, h - 0.15, 0);
            group.add(cavity);
          }
          if (basinOffset > 0) {
            addKitchenBasin(-basinOffset);
            addKitchenBasin(basinOffset);
          } else {
            addKitchenBasin(0);
          }
        } else {
          var basin = new THREE.Mesh(
            new THREE.BoxGeometry(w * 0.52, 0.24, d * 0.42),
            basinMat
          );
          basin.position.set(0, h - 0.15, 0);
          group.add(basin);
        }

        var faucetStem = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.55, 0.08), hardwareMat);
        faucetStem.position.set(0, h + 0.18, -d * 0.23);
        group.add(faucetStem);
        var faucetSpout = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.08, 0.08), hardwareMat);
        faucetSpout.position.set(0.15, h + 0.42, -d * 0.23);
        group.add(faucetSpout);
      } else if (type === 'refrigerator') {
        // Main body
        var fridge = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
          new THREE.MeshStandardMaterial({ color: '#c0c0c0', roughness: 0.3, metalness: 0.4 }));
        fridge.position.set(0, h / 2, 0);
        group.add(fridge);
        // Door line
        var doorLine = new THREE.Mesh(new THREE.BoxGeometry(w + 0.02, 0.05, d + 0.02),
          new THREE.MeshStandardMaterial({ color: '#888', roughness: 0.5 }));
        doorLine.position.set(0, h * 0.6, 0);
        group.add(doorLine);
        // Handle
        var handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.1),
          new THREE.MeshStandardMaterial({ color: '#999', roughness: 0.2, metalness: 0.6 }));
        handle.position.set(w / 2 - 0.3, h * 0.4, d / 2 + 0.08);
        group.add(handle);
      } else if (type === 'stove') {
        var stoveBody = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
          new THREE.MeshStandardMaterial({ color: '#333', roughness: 0.4, metalness: 0.3 }));
        stoveBody.position.set(0, h / 2, 0);
        group.add(stoveBody);
        // Burners
        for (var bx = -0.4; bx <= 0.4; bx += 0.8) {
          for (var bz = -0.4; bz <= 0.4; bz += 0.8) {
            var burner = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.05, 16),
              new THREE.MeshStandardMaterial({ color: '#222', roughness: 0.6, metalness: 0.5 }));
            burner.position.set(bx, h + 0.03, bz);
            group.add(burner);
          }
        }
      } else if (type === 'tv') {
        // Flat screen TV on stand
        var screen = new THREE.Mesh(new THREE.BoxGeometry(w, h * 0.7, 0.1),
          new THREE.MeshStandardMaterial({ color: '#111', roughness: 0.3, metalness: 0.4 }));
        screen.position.set(0, h * 0.65, 0);
        group.add(screen);
        // Screen bezel glow
        var screenFace = new THREE.Mesh(new THREE.BoxGeometry(w - 0.3, h * 0.7 - 0.2, 0.02),
          new THREE.MeshStandardMaterial({ color: '#1a2a3a', roughness: 0.1, metalness: 0.1, emissive: '#0a1520', emissiveIntensity: 0.3 }));
        screenFace.position.set(0, h * 0.65, 0.06);
        group.add(screenFace);
        // Stand
        var stand = new THREE.Mesh(new THREE.BoxGeometry(w * 0.15, h * 0.3, d * 0.5),
          new THREE.MeshStandardMaterial({ color: '#333', roughness: 0.5, metalness: 0.3 }));
        stand.position.set(0, h * 0.15, 0);
        group.add(stand);
        // Base
        var tvBase = new THREE.Mesh(new THREE.BoxGeometry(w * 0.5, 0.08, d * 0.8),
          new THREE.MeshStandardMaterial({ color: '#333', roughness: 0.5, metalness: 0.3 }));
        tvBase.position.set(0, 0.04, 0);
        group.add(tvBase);
      } else if (type === 'tall_closet') {
        var closetBody = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, d),
          new THREE.MeshStandardMaterial({ color: '#D0C1A8', roughness: 0.78 })
        );
        closetBody.position.set(0, h / 2, 0);
        group.add(closetBody);
        var doorCount = Math.max(2, Math.round(w / 2.2));
        var doorWidth = w / doorCount;
        for (var i = 0; i < doorCount; i++) {
          var door = new THREE.Mesh(
            new THREE.BoxGeometry(doorWidth - 0.08, h - 0.3, 0.06),
            new THREE.MeshStandardMaterial({ color: '#C5B395', roughness: 0.68 })
          );
          door.position.set(-w / 2 + doorWidth * (i + 0.5), h / 2, d / 2 + 0.04);
          group.add(door);
          var inset = new THREE.Mesh(
            new THREE.BoxGeometry(doorWidth - 0.38, h - 1.1, 0.03),
            new THREE.MeshStandardMaterial({ color: '#B89F7F', roughness: 0.72 })
          );
          inset.position.set(door.position.x, h / 2, d / 2 + 0.08);
          group.add(inset);
          var handle = new THREE.Mesh(
            new THREE.BoxGeometry(0.05, 1.15, 0.05),
            new THREE.MeshStandardMaterial({ color: '#7D6750', roughness: 0.3, metalness: 0.2 })
          );
          handle.position.set(door.position.x + doorWidth * 0.22, h / 2, d / 2 + 0.1);
          group.add(handle);
        }
      } else if (type === 'rug') {
        var rugMesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.05, d),
          new THREE.MeshStandardMaterial({ color, roughness: 0.95, metalness: 0 }));
        rugMesh.position.set(0, 0.03, 0);
        group.add(rugMesh);
      } else if (type === 'kitchen_counter') {
        // L or straight counter
        var counterTop = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d),
          new THREE.MeshStandardMaterial({ color: '#e8e4e0', roughness: 0.3, metalness: 0.05 }));
        counterTop.position.set(0, h, 0);
        group.add(counterTop);
        var counterBase = new THREE.Mesh(new THREE.BoxGeometry(w, h - 0.15, d),
          new THREE.MeshStandardMaterial({ color: '#d4c8b8', roughness: 0.7 }));
        counterBase.position.set(0, (h - 0.15) / 2, 0);
        group.add(counterBase);
      } else if (type === 'plant') {
        // Pot
        var pot = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 0.8, 12),
          new THREE.MeshStandardMaterial({ color: '#8B5E3C', roughness: 0.8 }));
        pot.position.set(0, 0.4, 0);
        group.add(pot);
        // Foliage
        var foliage = new THREE.Mesh(new THREE.SphereGeometry(0.6, 8, 8),
          new THREE.MeshStandardMaterial({ color: '#3a6b35', roughness: 0.9 }));
        foliage.position.set(0, 1.5, 0);
        group.add(foliage);
      } else {
        // Default box
        var box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        box.position.set(0, h / 2, 0);
        group.add(box);
      }

      group.traverse(child => {
        if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
      });
      return group;
    }

    furniture3D.forEach(item => {
      const piece = makeFurniturePiece(item.type, item.width, item.height, item.depth, item.color);
      piece.position.set(item.position.x, 0, item.position.z);
      piece.rotation.set(0, -item.rotation, 0);
      scene.add(piece);
    });

    // --- Decorations (Casielo — 387 sqft ADU) ---

    // TV between 2 windows on east wall (x=9)
    // Windows at z=-3.8 approx (between pos 0.15 and 0.55 on wall from z=-11.5 to z=10.5)
    // Midpoint: z = -11.5 + 0.35 * 22 = -3.8
    var tv = makeFurniturePiece('tv', 3.5, 3, 1, '#222');
    tv.position.set(8.5, 1.8, -3.8);
    tv.rotation.set(0, Math.PI / 2, 0);
    scene.add(tv);
    // TV console table below TV
    var tvConsole = makeFurniturePiece('kitchen_counter', 1.2, 1.8, 4, '#6B5B4B');
    tvConsole.position.set(8.3, 0, -3.8);
    scene.add(tvConsole);

    // Rugs
    var bedRug = makeFurniturePiece('rug', 6, 0.05, 5, '#C4B898');
    bedRug.position.set(-2.5, 0, -4);
    scene.add(bedRug);
    var livingRug = makeFurniturePiece('rug', 5, 0.05, 5, '#B0A088');
    livingRug.position.set(5.5, 0, -6);
    scene.add(livingRug);
    var bathRug = makeFurniturePiece('rug', 2, 0.05, 1.5, '#90B0C0');
    bathRug.position.set(-3, 0, 5);
    scene.add(bathRug);

    // Kitchen counter — wall run + peninsula to match the Waverly render more closely.
    var kcGroup = new THREE.Group();
    var kcMat = new THREE.MeshStandardMaterial({ color: '#F0F0ED', roughness: 0.72 });
    var kcTopMat = new THREE.MeshStandardMaterial({ color: '#FBFBFA', roughness: 0.22, metalness: 0.03 });
    function addCounterBlock(width, depth, x, z) {
      var base = new THREE.Mesh(new THREE.BoxGeometry(width, 2.85, depth), kcMat);
      base.position.set(x, 1.425, z);
      kcGroup.add(base);
      var top = new THREE.Mesh(new THREE.BoxGeometry(width + 0.08, 0.15, depth + 0.08), kcTopMat);
      top.position.set(x, 2.995, z);
      kcGroup.add(top);
    }
    // Back run under the kitchen side window
    addCounterBlock(2, 8, 8, 6.5);
    // Peninsula / breakfast bar projecting into the room
    addCounterBlock(4.6, 2, 5.5, 8.9);
    kcGroup.traverse(child => {
      if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
    });
    scene.add(kcGroup);

    var stool1 = makeFurniturePiece('dining_chair', 1.2, 2.7, 1.2, '#E8E1D4');
    stool1.position.set(4.4, 0, 10);
    scene.add(stool1);
    var stool2 = makeFurniturePiece('dining_chair', 1.2, 2.7, 1.2, '#E8E1D4');
    stool2.position.set(6.1, 0, 10);
    scene.add(stool2);

    // Bathroom mirror
    var mirrorMat = new THREE.MeshStandardMaterial({ color: '#c0d0e0', roughness: 0.05, metalness: 0.8 });
    var mirror1 = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 0.08), mirrorMat);
    mirror1.position.set(-2.5, 5, 3.7);
    scene.add(mirror1);

    // --- Ground Plane ---
    const groundMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({ color: COLORS.GROUND, roughness: 0.9 })
    );
    groundMesh.rotation.set(-Math.PI / 2, 0, 0);
    groundMesh.position.set(bounds.centerX, -0.01, bounds.centerZ);
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // ============================================
    // Interactive Room Labels + Image Popup
    // ============================================

    // Room → image mapping
    const IMG_BASE = './assets/adu-plans/casielo/';
    const roomImages = {
      'Bedroom':      { img: 'bedroom.jpg', desc: 'Bedroom rendering' },
      'Living Room':  { img: 'living.jpg', desc: 'Living room rendering' },
      'Kitchen':      { img: 'kitchen.jpg', desc: 'Kitchen rendering' },
      'Bathroom':     { img: 'bathroom.jpg', desc: 'Bathroom rendering' },
      'Overview':     { img: 'overview.jpg', desc: 'Casielo overview rendering' },
    };

    // Room label positions (Three.js coords)
    const roomLabels = [
      { name: 'Bedroom',      x: -2.5,  y: 9.5, z: -4 },
      { name: 'Living Room',  x: 5.5,   y: 9.5, z: -2 },
      { name: 'Kitchen',      x: 5,     y: 9.5, z: 6 },
      { name: 'Bathroom',     x: -4,    y: 9.5, z: 7 },
    ];

    // Create sprite labels
    const labelSprites = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function createLabelSprite(text, x, y, z) {
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      // Background pill
      ctx.fillStyle = 'rgba(17,17,17,0.85)';
      ctx.beginPath();
      ctx.roundRect(4, 4, 248, 56, 12);
      ctx.fill();
      // Border
      ctx.strokeStyle = 'rgba(200,168,110,0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(4, 4, 248, 56, 12);
      ctx.stroke();
      // Text
      ctx.fillStyle = '#f0ede8';
      ctx.font = '600 22px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 128, 28);
      // "VIEW" subtext
      ctx.fillStyle = 'rgba(200,168,110,0.8)';
      ctx.font = '500 12px system-ui, sans-serif';
      ctx.fillText('CLICK TO VIEW', 128, 48);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
      const sprite = new THREE.Sprite(material);
      sprite.position.set(x, y, z);
      sprite.scale.set(5, 1.25, 1);
      sprite.userData = { roomName: text, isLabel: true };
      return sprite;
    }

    roomLabels.forEach(label => {
      const sprite = createLabelSprite(label.name, label.x, label.y, label.z);
      scene.add(sprite);
      labelSprites.push(sprite);
    });

    // Image overlay DOM
    const overlay = document.createElement('div');
    overlay.id = 'room-overlay';
    overlay.innerHTML = `
      <div class="ro-backdrop"></div>
      <div class="ro-content">
        <button class="ro-close">&times;</button>
        <img class="ro-img" src="" alt="">
        <div class="ro-caption"></div>
      </div>
    `;
    document.body.appendChild(overlay);

    // Overlay styles
    const overlayStyle = document.createElement('style');
    overlayStyle.textContent = `
      #room-overlay { display:none; position:fixed; inset:0; z-index:100; }
      #room-overlay.active { display:flex; align-items:center; justify-content:center; }
      .ro-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.85); cursor:pointer; }
      .ro-content { position:relative; max-width:90vw; max-height:90vh; z-index:1; }
      .ro-img { display:block; max-width:90vw; max-height:80vh; border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,0.6); }
      .ro-caption { text-align:center; color:#f0ede8; font:500 16px/1.5 system-ui,sans-serif; margin-top:12px; letter-spacing:0.02em; }
      .ro-close { position:absolute; top:-16px; right:-16px; width:40px; height:40px; border-radius:50%; border:none; background:#222; color:#f0ede8; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:2; }
      .ro-close:hover { background:#c8222a; }
    `;
    document.head.appendChild(overlayStyle);

    // Close overlay
    overlay.querySelector('.ro-backdrop').addEventListener('click', () => overlay.classList.remove('active'));
    overlay.querySelector('.ro-close').addEventListener('click', () => overlay.classList.remove('active'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('active'); });

    // Show room image
    function showRoomImage(roomName) {
      const data = roomImages[roomName];
      if (!data) return;
      if (EMBED_MODE && window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'adu-plan-room-select',
          plan: PLAN_SLUG,
          room: roomName,
          image: IMG_BASE + data.img,
          description: data.desc,
        }, '*');
        return;
      }
      overlay.querySelector('.ro-img').src = IMG_BASE + data.img;
      overlay.querySelector('.ro-caption').textContent = data.desc;
      overlay.classList.add('active');
    }

    // Mouse interaction
    let hoveredLabel = null;
    const canvasEl = renderer.domElement;

    canvasEl.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    canvasEl.addEventListener('click', e => {
      if (hoveredLabel) {
        showRoomImage(hoveredLabel.userData.roomName);
      }
    });

    // ============================================
    // Animation Loop
    // ============================================
    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      // Raycast for label hover
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(labelSprites);
      if (intersects.length > 0 && intersects[0].object.userData.isLabel) {
        if (hoveredLabel !== intersects[0].object) {
          // Reset previous
          if (hoveredLabel) hoveredLabel.scale.set(5, 1.25, 1);
          hoveredLabel = intersects[0].object;
          hoveredLabel.scale.set(5.5, 1.4, 1); // Scale up on hover
        }
        canvasEl.style.cursor = 'pointer';
      } else {
        if (hoveredLabel) {
          hoveredLabel.scale.set(5, 1.25, 1);
          hoveredLabel = null;
        }
        canvasEl.style.cursor = 'grab';
      }

      renderer.render(scene, camera);
    }
    animate();

    // Resize handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
