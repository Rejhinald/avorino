<div class="av-form-section av-form-section--cream">
  <div class="av-form-header">
    <h2 class="av-form-heading">Start your project</h2>
    <p class="av-form-sub">Fill out the form and we'll respond within 24 hours.</p>
  </div>
  <form class="av-form" name="Contact Form" method="post" data-name="Contact Form">
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="name">Full Name</label>
      <input class="av-form-input" type="text" name="name" id="name" placeholder="Your full name" required>
    </div>
    <div class="av-form-row">
      <div class="av-form-field">
        <label class="av-form-label" for="email">Email</label>
        <input class="av-form-input" type="email" name="email" id="email" placeholder="you@email.com" required>
      </div>
      <div class="av-form-field">
        <label class="av-form-label" for="phone">Phone</label>
        <input class="av-form-input" type="tel" name="phone" id="phone" placeholder="(000) 000-0000">
      </div>
    </div>
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="address">Property Address</label>
      <input class="av-form-input" type="text" name="address" id="address" placeholder="Street address, City, CA">
    </div>
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="service">Service Type</label>
      <select class="av-form-select" name="service" id="service">
        <option value="" disabled selected>Select a service</option>
        <option value="ADU">ADU</option>
        <option value="Custom Home">Custom Home</option>
        <option value="Renovation">Renovation</option>
        <option value="Addition">Addition</option>
        <option value="Garage Conversion">Garage Conversion</option>
        <option value="Commercial">Commercial</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="message">Message</label>
      <textarea class="av-form-textarea" name="message" id="message" placeholder="Tell us about your project"></textarea>
    </div>
    <button type="submit" class="av-form-submit">Send Message</button>
  </form>
</div>
