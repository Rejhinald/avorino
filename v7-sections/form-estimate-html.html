<div class="av-form-section av-form-section--cream">
  <div class="av-form-header">
    <h2 class="av-form-heading">Get a Free Estimate</h2>
    <p class="av-form-sub">Tell us about your project and we'll provide a detailed estimate within 48 hours.</p>
  </div>
  <form class="av-form" name="Free Estimate" method="post" data-name="Free Estimate">
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="est-name">Full Name</label>
      <input class="av-form-input" type="text" name="name" id="est-name" placeholder="Your full name" required>
    </div>
    <div class="av-form-row">
      <div class="av-form-field">
        <label class="av-form-label" for="est-email">Email</label>
        <input class="av-form-input" type="email" name="email" id="est-email" placeholder="you@email.com" required>
      </div>
      <div class="av-form-field">
        <label class="av-form-label" for="est-phone">Phone</label>
        <input class="av-form-input" type="tel" name="phone" id="est-phone" placeholder="(000) 000-0000">
      </div>
    </div>
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="est-address">Property Address</label>
      <input class="av-form-input" type="text" name="address" id="est-address" placeholder="Street address, City, CA">
    </div>
    <div class="av-form-row">
      <div class="av-form-field">
        <label class="av-form-label" for="est-service">Service Type</label>
        <select class="av-form-select" name="service" id="est-service">
          <option value="" disabled selected>Select a service</option>
          <option value="ADU">ADU</option>
          <option value="Custom Home">Custom Home</option>
          <option value="Renovation">Renovation</option>
          <option value="Addition">Addition</option>
          <option value="Garage Conversion">Garage Conversion</option>
          <option value="Commercial">Commercial</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="av-form-field">
        <label class="av-form-label" for="est-budget">Budget Range</label>
        <select class="av-form-select" name="budget" id="est-budget">
          <option value="" disabled selected>Select range</option>
          <option value="Under $100K">Under $100K</option>
          <option value="$100K-$250K">$100K–$250K</option>
          <option value="$250K-$500K">$250K–$500K</option>
          <option value="$500K-$1M">$500K–$1M</option>
          <option value="$1M+">$1M+</option>
          <option value="Not sure yet">Not sure yet</option>
        </select>
      </div>
    </div>
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="est-timeline">Timeline</label>
      <select class="av-form-select" name="timeline" id="est-timeline">
        <option value="" disabled selected>Select timeline</option>
        <option value="Ready now">Ready now</option>
        <option value="1-3 months">1–3 months</option>
        <option value="3-6 months">3–6 months</option>
        <option value="6-12 months">6–12 months</option>
        <option value="Just exploring">Just exploring</option>
      </select>
    </div>
    <div class="av-form-field av-form-field--full">
      <label class="av-form-label" for="est-details">Project Details</label>
      <textarea class="av-form-textarea" name="details" id="est-details" placeholder="Describe your project — size, goals, anything relevant."></textarea>
    </div>
    <button type="submit" class="av-form-submit">Request Estimate</button>
  </form>
</div>
